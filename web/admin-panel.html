<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilPark 2.1 - Yönetici ve İş Zekası Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --bg: #1e1e2f; --card-bg: #27293d; --text: #ffffff; --primary: #e14eca; --success: #00f2c3; --warning: #ff8d72; --info: #1d8cf8; --danger: #fd5d93;}
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); padding: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 20px; }
        .header h1 { font-size: 28px; color: var(--primary); }
        .live-badge { background: rgba(0, 242, 195, 0.2); color: var(--success); padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px;}
        .dot { height: 10px; width: 10px; background-color: var(--success); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* Anlık Durum Kartları */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 5px solid var(--primary); }
        .card h3 { font-size: 14px; color: #9a9a9a; margin-bottom: 10px; font-weight: 600; text-transform: uppercase;}
        .card .value { font-size: 36px; font-weight: 700; }

        /* Grafikler Bölümü */
        .charts-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-container { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center;}
        .chart-container h2 { font-size: 18px; margin-bottom: 20px; color: #fff; text-align: center;}
        canvas { max-height: 250px; }

        /* Tablo ve Excel Butonu */
        .table-container { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow-x: auto; }
        .table-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-header-row h2 { font-size: 20px; color: #fff; }

        .btn-excel { background-color: #217346; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s;}
        .btn-excel:hover { background-color: #1e5c38; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(33, 115, 70, 0.4);}

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: #9a9a9a; border-bottom: 1px solid #333; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px;}
        .badge-paid { background: rgba(0, 242, 195, 0.2); color: var(--success); }
        .badge-runaway { background: rgba(253, 93, 147, 0.2); color: var(--danger); }
        .plate-badge { background: #fff; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; border: 2px solid #ddd;}
    </style>
</head>
<body>

<div class="header">
    <h1>🅿️ BilPark Paneli</h1>
    <div class="live-badge"><span class="dot"></span> BİLPARK 2.1 CANLI</div>
</div>

<div class="dashboard-cards">
    <div class="card" style="border-color: var(--success);">
        <h3>Sokaktaki Aktif Araç</h3>
        <div class="value" id="totalActive" style="color: var(--success);">0</div>
    </div>
    <div class="card" style="border-color: var(--info);">
        <h3>Tevfik Bey Cad.</h3>
        <div class="value" id="countTevfik" style="color: var(--info);">0</div>
    </div>
    <div class="card" style="border-color: var(--warning);">
        <h3>Cumhuriyet Cad.</h3>
        <div class="value" id="countCumhuriyet" style="color: var(--warning);">0</div>
    </div>
    <div class="card" style="border-color: var(--primary);">
        <h3>Ali Rıza Özkay Cad.</h3>
        <div class="value" id="countAliRiza" style="color: var(--primary);">0</div>
    </div>
</div>

<div class="charts-section">
    <div class="chart-container">
        <h2>💰 Araç Tipine Göre Ciro Dağılımı</h2>
        <canvas id="incomeChart"></canvas>
    </div>
    <div class="chart-container">
        <h2>🚨 Operasyon Başarısı (Ödeyen / Kaçan)</h2>
        <canvas id="statusChart"></canvas>
    </div>
</div>

<div class="table-container">
    <div class="table-header-row">
        <h2>📄 Son Arşiv Kayıtları (Tahsilatlar ve Kaçaklar)</h2>
        <button class="btn-excel" onclick="downloadExcel()">📊 Excel Olarak İndir</button>
    </div>
    <table>
        <thead>
        <tr>
            <th>Plaka</th>
            <th>Cadde</th>
            <th>Giriş / Çıkış</th>
            <th>Durum</th>
            <th>Tutar</th>
        </tr>
        </thead>
        <tbody id="historyTableBody">
        </tbody>
    </table>
</div>

<script>
    const BASE_URL = "https://bilpark-api-rtdl.onrender.com/api/parking"; // Render Linkin

    let incomeChartInstance = null;
    let statusChartInstance = null;
    let globalHistoryData = []; // Excel indirme için veriyi hafızada tutacağız

    const streetNames = {
        "TEVFIK_BEY": "Tevfik Bey Caddesi",
        "ALI_RIZA_OZKAY": "Ali Rıza Özkay Caddesi",
        "CUMHURIYET": "Cumhuriyet Caddesi"
    };

    // --- 1. CANLI SAHA VERİLERİNİ ÇEK ---
    async function fetchActiveSpots() {
        try {
            const response = await fetch(`${BASE_URL}/spots`);
            const spots = await response.json();

            let total = spots.length;
            let cTevfik = 0, cCumhuriyet = 0, cAliRiza = 0;

            spots.forEach(spot => {
                if(spot.street === 'TEVFIK_BEY') cTevfik++;
                if(spot.street === 'CUMHURIYET') cCumhuriyet++;
                if(spot.street === 'ALI_RIZA_OZKAY') cAliRiza++;
            });

            document.getElementById("totalActive").innerText = total;
            document.getElementById("countTevfik").innerText = cTevfik;
            document.getElementById("countCumhuriyet").innerText = cCumhuriyet;
            document.getElementById("countAliRiza").innerText = cAliRiza;
        } catch (error) { console.error("Saha verisi hatası:", error); }
    }

    // --- 2. İŞ ZEKASI GRAFİKLERİNİ ÇEK ---
    async function fetchBICharts() {
        try {
            // Ciro Verisi Çek (Doughnut Chart)
            const incomeRes = await fetch(`${BASE_URL}/bi/income-by-type`);
            const incomeData = await incomeRes.json();

            const incomeCtx = document.getElementById('incomeChart').getContext('2d');
            if(incomeChartInstance) incomeChartInstance.destroy(); // Eski grafiği sil, yenisini çiz (animasyon için)
            incomeChartInstance = new Chart(incomeCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(incomeData),
                    datasets: [{
                        data: Object.values(incomeData),
                        backgroundColor: ['#e14eca', '#1d8cf8'], // Pembe ve Mavi
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { labels: { color: '#fff' } } } }
            });

            // Kaçan/Ödeyen Verisi Çek (Pie Chart)
            const statusRes = await fetch(`${BASE_URL}/bi/status-count`);
            const statusData = await statusRes.json();

            const statusCtx = document.getElementById('statusChart').getContext('2d');
            if(statusChartInstance) statusChartInstance.destroy();
            statusChartInstance = new Chart(statusCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(statusData),
                    datasets: [{
                        data: Object.values(statusData),
                        backgroundColor: ['#00f2c3', '#fd5d93'], // Yeşil(Ödedi) ve Kırmızı(Kaçtı)
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { labels: { color: '#fff' } } } }
            });

        } catch (error) { console.error("Grafik verisi hatası:", error); }
    }

    // --- 3. GEÇMİŞ TABLOSUNU ÇEK VE EXCEL İÇİN HAZIRLA ---
    async function fetchHistoryTable() {
        try {
            const response = await fetch(`${BASE_URL}/bi/last-records`);
            const records = await response.json();
            globalHistoryData = records; // Excel'e basmak için küresele attık

            let tableHTML = "";
            records.forEach(r => {
                let entryDate = new Date(r.entryTime).toLocaleString('tr-TR', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'short' });
                let exitDate = r.exitTime ? new Date(r.exitTime).toLocaleString('tr-TR', { hour: '2-digit', minute:'2-digit' }) : "Bilinmiyor";
                let displayStreet = streetNames[r.street] || r.street;

                let badgeClass = r.status === 'PAID' ? 'badge-paid' : 'badge-runaway';
                let badgeText = r.status === 'PAID' ? 'Tahsil Edildi ✅' : 'Ödemeden Kaçtı 🚨';
                let feeText = r.fee ? r.fee + " TL" : "0 TL";

                tableHTML += `
                    <tr>
                        <td><span class="plate-badge">${r.licensePlate}</span></td>
                        <td style="color: #1d8cf8; font-weight:bold;">${displayStreet}</td>
                        <td style="font-size:13px; color:#aaa;">${entryDate} -> ${exitDate}</td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        <td style="font-weight:bold; font-size:16px;">${feeText}</td>
                    </tr>
                `;
            });

            if(records.length === 0) {
                document.getElementById("historyTableBody").innerHTML = `<tr><td colspan="5" style="text-align:center; color:gray;">Henüz arşiv kaydı bulunmuyor.</td></tr>`;
            } else {
                document.getElementById("historyTableBody").innerHTML = tableHTML;
            }

        } catch (error) { console.error("Tablo verisi hatası:", error); }
    }

    // --- 4. MÜTHİŞ ÖZELLİK: EXCEL İNDİRME ---
    function downloadExcel() {
        if(globalHistoryData.length === 0) {
            alert("İndirilecek veri yok!");
            return;
        }

        // Gelen JSON verisini Türkçeleştirip Excel formatına uygun hale getiriyoruz
        const excelData = globalHistoryData.map(r => ({
            "Plaka": r.licensePlate,
            "İl / İlçe": `${r.region} - ${r.neighborhood}`,
            "Cadde": streetNames[r.street] || r.street,
            "Durum": r.status === 'PAID' ? 'ÖDENDİ' : 'KAÇTI',
            "Tutar (TL)": r.fee || 0,
            "Giriş Zamanı": new Date(r.entryTime).toLocaleString('tr-TR'),
            "Çıkış Zamanı": r.exitTime ? new Date(r.exitTime).toLocaleString('tr-TR') : "-"
        }));

        // SheetJS ile Excel oluşturma sihirbazlığı
        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "BilPark Rapor");

        // Dosyayı indir
        XLSX.writeFile(workbook, "BilPark_Gecmis_Rapor.xlsx");
    }

    // --- SİSTEMİ BAŞLAT VE HER 10 SANİYEDE BİR YENİLE ---
    function updateDashboard() {
        fetchActiveSpots();
        fetchBICharts();
        fetchHistoryTable();
    }

    updateDashboard();
    setInterval(updateDashboard, 10000); // Admin panelini yormamak için 10 saniyede bir güncellenir

</script>
</body>
</html>
