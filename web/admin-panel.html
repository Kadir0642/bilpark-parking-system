<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilPark - Yönetici Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1e1e2f; --card-bg: #27293d; --text: #ffffff; --primary: #e14eca; --success: #00f2c3; --danger: #fd5d93; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); padding: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #333; padding-bottom: 20px; }
        .header h1 { font-size: 28px; color: var(--primary); }
        .live-badge { background: rgba(0, 242, 195, 0.2); color: var(--success); padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px;}
        .dot { height: 10px; width: 10px; background-color: var(--success); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* İstatistik Kartları */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 5px solid var(--primary); }
        .card h3 { font-size: 16px; color: #9a9a9a; margin-bottom: 10px; font-weight: 400; }
        .card .value { font-size: 36px; font-weight: 700; }
        .card.green { border-color: var(--success); }
        .card.red { border-color: var(--danger); }

        /* Aktif Araçlar Tablosu */
        .table-container { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow-x: auto; }
        .table-container h2 { margin-bottom: 20px; font-size: 20px; color: #fff; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: #9a9a9a; border-bottom: 1px solid #333; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .plate-badge { background: #fff; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; border: 2px solid #ddd;}
    </style>
</head>
<body>

<div class="header">
    <h1>🅿️ BilPark Kontrol Merkezi</h1>
    <div class="live-badge"><span class="dot"></span> CANLI SİSTEM BAĞLANTISI</div>
</div>

<div class="dashboard-cards">
    <div class="card">
        <h3>Toplam Kapasite</h3>
        <div class="value" id="totalSpots">0</div>
    </div>
    <div class="card red">
        <h3>Dolu Park Yeri (Aktif)</h3>
        <div class="value" id="occupiedSpots" style="color: var(--danger);">0</div>
    </div>
    <div class="card green">
        <h3>Boş Park Yeri</h3>
        <div class="value" id="emptySpots" style="color: var(--success);">0</div>
    </div>
    <div class="card">
        <h3>Doluluk Oranı</h3>
        <div class="value" id="occupancyRate">%0</div>
    </div>
</div>

<div class="table-container">
    <h2>🚗 Otoparktaki Aktif Araçlar</h2>
    <table>
        <thead>
        <tr>
            <th>Park Yeri</th>
            <th>Araç Plakası</th>
            <th>Giriş Zamanı</th>
            <th>Araç Tipi</th>
        </tr>
        </thead>
        <tbody id="carTableBody">
        </tbody>
    </table>
</div>

<script>
    const API_URL = "https://bilpark-api-rtdl.onrender.com/api/parking/spots";

    async function fetchDashboardData() {
        try {
            const response = await fetch(API_URL);
            const spots = await response.json();

            let total = spots.length;
            let occupied = 0;
            let empty = 0;
            let tableHTML = "";

            spots.forEach(spot => {
                if(spot.occupied) {
                    occupied++;
                    // Tarihi güzelleştirme
                    let entryDate = new Date(spot.entryTime).toLocaleString('tr-TR', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'short' });

                    tableHTML += `
                        <tr>
                            <td style="font-weight: bold; color: #e14eca;">${spot.spotName}</td>
                            <td><span class="plate-badge">${spot.currentPlate}</span></td>
                            <td>${entryDate}</td>
                            <td>${spot.suitableFor === 'LARGE' ? 'Kamyonet/Ticari 🚐' : 'Standart Otomobil 🚗'}</td>
                        </tr>
                    `;
                } else {
                    empty++;
                }
            });

            // Kartları Güncelle
            document.getElementById("totalSpots").innerText = total;
            document.getElementById("occupiedSpots").innerText = occupied;
            document.getElementById("emptySpots").innerText = empty;

            let rate = total === 0 ? 0 : Math.round((occupied / total) * 100);
            document.getElementById("occupancyRate").innerText = "%" + rate;

            // Tabloyu Güncelle
            if(occupied === 0) {
                document.getElementById("carTableBody").innerHTML = `<tr><td colspan="4" style="text-align:center; color:gray;">Otopark şu an tamamen boş.</td></tr>`;
            } else {
                document.getElementById("carTableBody").innerHTML = tableHTML;
            }

        } catch (error) {
            console.error("Veri çekme hatası:", error);
        }
    }

    // Sayfa açıldığında veriyi çek
    fetchDashboardData();

    // Her 5 saniyede bir veriyi otomatik güncelle (Gerçek Zamanlı Hissi Vermek İçin)
    setInterval(fetchDashboardData, 5000);
</script>

</body>
</html>
