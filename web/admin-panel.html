<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilPark 2.0 - Yönetici Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1e1e2f; --card-bg: #27293d; --text: #ffffff; --primary: #e14eca; --success: #00f2c3; --warning: #ff8d72; --info: #1d8cf8; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); padding: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #333; padding-bottom: 20px; }
        .header h1 { font-size: 28px; color: var(--primary); }
        .live-badge { background: rgba(0, 242, 195, 0.2); color: var(--success); padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px;}
        .dot { height: 10px; width: 10px; background-color: var(--success); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* İstatistik Kartları */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 5px solid var(--primary); }
        .card h3 { font-size: 14px; color: #9a9a9a; margin-bottom: 10px; font-weight: 600; text-transform: uppercase;}
        .card .value { font-size: 36px; font-weight: 700; }
        .card.total { border-color: var(--success); }
        .card.tevfik { border-color: var(--info); }
        .card.cumhuriyet { border-color: var(--warning); }
        .card.aliriza { border-color: var(--primary); }

        /* Aktif Araçlar Tablosu */
        .table-container { background-color: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow-x: auto; }
        .table-container h2 { margin-bottom: 20px; font-size: 20px; color: #fff; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: #9a9a9a; border-bottom: 1px solid #333; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .plate-badge { background: #fff; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; border: 2px solid #ddd;}
        .street-badge { background: rgba(29, 140, 248, 0.2); color: #1d8cf8; padding: 5px 10px; border-radius: 5px; font-size: 13px; font-weight: bold;}
    </style>
</head>
<body>

<div class="header">
    <h1>🅿️ BilPark Başkan Paneli</h1>
    <div class="live-badge"><span class="dot"></span> CANLI VERİ (BİLPARK 2.0)</div>
</div>

<div class="dashboard-cards">
    <div class="card total">
        <h3>Sokaktaki Toplam Araç</h3>
        <div class="value" id="totalActive" style="color: var(--success);">0</div>
    </div>
    <div class="card tevfik">
        <h3>Tevfik Bey Cad.</h3>
        <div class="value" id="countTevfik" style="color: var(--info);">0</div>
    </div>
    <div class="card cumhuriyet">
        <h3>Cumhuriyet Cad.</h3>
        <div class="value" id="countCumhuriyet" style="color: var(--warning);">0</div>
    </div>
    <div class="card aliriza">
        <h3>Ali Rıza Özkay Cad.</h3>
        <div class="value" id="countAliRiza" style="color: var(--primary);">0</div>
    </div>
</div>

<div class="table-container">
    <h2>🚗 Caddelerdeki Canlı Araç Akışı</h2>
    <table>
        <thead>
        <tr>
            <th>Bulunduğu Cadde</th>
            <th>Araç Plakası</th>
            <th>Giriş Zamanı</th>
            <th>Araç Tipi</th>
        </tr>
        </thead>
        <tbody id="carTableBody">
        </tbody>
    </table>
</div>

<script>
    // DİKKAT: Render bulut linkin burada!
    const API_URL = "https://bilpark-api-rtdl.onrender.com/api/parking/spots";

    const streetNames = {
        "TEVFIK_BEY": "Tevfik Bey Caddesi",
        "ALI_RIZA_OZKAY": "Ali Rıza Özkay Caddesi",
        "CUMHURIYET": "Cumhuriyet Caddesi"
    };

    async function fetchDashboardData() {
        try {
            const response = await fetch(API_URL);
            const spots = await response.json(); // Artık bu liste direk "Sokaktaki Araçları" veriyor

            let total = spots.length;
            let cTevfik = 0, cCumhuriyet = 0, cAliRiza = 0;
            let tableHTML = "";

            spots.forEach(spot => {
                // Cadde Sayaçlarını Artır
                if(spot.street === 'TEVFIK_BEY') cTevfik++;
                if(spot.street === 'CUMHURIYET') cCumhuriyet++;
                if(spot.street === 'ALI_RIZA_OZKAY') cAliRiza++;

                // Tarihi güzelleştirme
                let entryDate = new Date(spot.entryTime).toLocaleString('tr-TR', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'short' });
                let displayStreet = streetNames[spot.street] || spot.street;

                tableHTML += `
                    <tr>
                        <td><span class="street-badge">${displayStreet}</span></td>
                        <td><span class="plate-badge">${spot.currentPlate}</span></td>
                        <td>${entryDate}</td>
                        <td>${spot.currentType === 'LARGE' ? 'Kamyonet 🚐' : 'Otomobil 🚗'}</td>
                    </tr>
                `;
            });

            // Kartları Güncelle
            document.getElementById("totalActive").innerText = total;
            document.getElementById("countTevfik").innerText = cTevfik;
            document.getElementById("countCumhuriyet").innerText = cCumhuriyet;
            document.getElementById("countAliRiza").innerText = cAliRiza;

            // Tabloyu Güncelle
            if(total === 0) {
                document.getElementById("carTableBody").innerHTML = `<tr><td colspan="4" style="text-align:center; color:gray;">Sokaklarda aktif araç bulunmuyor.</td></tr>`;
            } else {
                document.getElementById("carTableBody").innerHTML = tableHTML;
            }

        } catch (error) {
            console.error("Veri çekme hatası:", error);
        }
    }

    fetchDashboardData();
    setInterval(fetchDashboardData, 5000); // 5 saniyede bir canli yenile
</script>

</body>
</html>
